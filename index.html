<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folha de Pagamento - Sistema de Gestão</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Folha de Pagamento</h1>
            <p>Sistema de Gestão de Salários</p>
        </header>

        <nav class="menu">
            <button class="btn-menu active" onclick="mostrarSecao('cadastro')">Cadastro</button>
            <button class="btn-menu" onclick="mostrarSecao('folha')">Folha de Pagamento</button>
            <button class="btn-menu" onclick="mostrarSecao('relatorio')">Relatório</button>
        </nav>

        <!-- SEÇÃO DE CADASTRO -->
        <section id="cadastro" class="secao ativa">
            <h2>Cadastro de Funcionários</h2>
            <form id="formFuncionario">
                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" placeholder="Digite o nome do funcionário" required>
                </div>

                <div class="form-group">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" required>
                </div>

                <div class="form-group">
                    <label for="cargo">Cargo:</label>
                    <input type="text" id="cargo" placeholder="Ex: Desenvolvedor, Gerente..." required>
                </div>

                <div class="form-group">
                    <label for="salario">Salário Base (R$):</label>
                    <input type="number" id="salario" placeholder="0.00" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="dataAdmissao">Data de Admissão:</label>
                    <input type="date" id="dataAdmissao" required>
                </div>

                <button type="submit" class="btn-principal">Cadastrar Funcionário</button>
            </form>

            <h3>Funcionários Cadastrados</h3>
            <div id="listaFuncionarios" class="lista-funcionarios"></div>
        </section>

        <!-- SEÇÃO DE FOLHA DE PAGAMENTO -->
        <section id="folha" class="secao">
            <h2>Gerar Folha de Pagamento</h2>
            <form id="formFolha">
                <div class="form-group">
                    <label for="funcionarioSelect">Selecione o Funcionário:</label>
                    <select id="funcionarioSelect" required>
                        <option value="">-- Selecione --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mes">Mês/Ano:</label>
                    <input type="month" id="mes" required>
                </div>

                <div class="form-group">
                    <label for="horasExtra">Horas Extras (quantidade):</label>
                    <input type="number" id="horasExtra" placeholder="0" value="0" step="0.5">
                </div>

                <div class="form-group">
                    <label for="desconto">Desconto Adicional (R$):</label>
                    <input type="number" id="desconto" placeholder="0.00" value="0" step="0.01">
                </div>

                <button type="submit" class="btn-principal">Gerar Folha</button>
            </form>

            <h3>Resultado da Folha de Pagamento</h3>
            <div id="resultadoFolha" class="resultado"></div>
        </section>

        <!-- SEÇÃO DE RELATÓRIO -->
        <section id="relatorio" class="secao">
            <h2>Relatório Geral</h2>
            <div id="relatorioCompleto" class="relatorio"></div>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
